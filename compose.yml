# Single-host deployment: cloud platform + the template app from this repo.
#
# Active services: gateway, core, dashboard, settings, logging, notifications,
# accounts. Other platform apps are commented at the bottom — uncomment to
# enable them.
#
# Configure via .env (see .env.example).

x-shared-env: &shared-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://valkey:6379
  APP_SECRET: ${APP_SECRET}

x-app: &app
  restart: unless-stopped
  environment: *shared-env

services:
  # ── Infrastructure ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes: [valkey_data:/data]

  # ── Gateway (the only service exposed to the host) ─────────────────
  gateway:
    <<: *app
    image: ghcr.io/valentinkolb/cloud-gateway:latest
    ports: ["3000:3000"]
    depends_on:
      postgres: { condition: service_healthy }

  # ── Platform apps ──────────────────────────────────────────────────
  app-core:
    <<: *app
    image: ghcr.io/valentinkolb/cloud-core:latest
    depends_on:
      postgres: { condition: service_healthy }

  app-dashboard:
    <<: *app
    image: ghcr.io/valentinkolb/cloud-app-dashboard:latest

  app-settings:
    <<: *app
    image: ghcr.io/valentinkolb/cloud-app-settings:latest

  app-logging:
    <<: *app
    image: ghcr.io/valentinkolb/cloud-app-logging:latest

  app-notifications:
    <<: *app
    image: ghcr.io/valentinkolb/cloud-app-notifications:latest

  app-accounts:
    <<: *app
    image: ghcr.io/valentinkolb/cloud-app-accounts:latest

  # ── Your app (built from this repo's Dockerfile) ───────────────────
  app-expeditions:
    <<: *app
    build: .

  # ── Optional: more platform apps ───────────────────────────────────
  # Uncomment to enable. They register with the gateway via Redis
  # automatically; no other config needed (settings via /admin/settings).
  #
  # app-notebooks:
  #   <<: *app
  #   image: ghcr.io/valentinkolb/cloud-app-notebooks:latest
  #
  # app-files:
  #   <<: *app
  #   image: ghcr.io/valentinkolb/cloud-app-files:latest
  #   environment:
  #     <<: *shared-env
  #     FILEGATE_URL: http://filegate:4000
  #     FILEGATE_TOKEN: ${FILEGATE_TOKEN}
  #   depends_on: [filegate]
  #
  # filegate:
  #   image: ghcr.io/valentinkolb/filegate:latest
  #   restart: unless-stopped
  #   environment:
  #     FILE_PROXY_TOKEN: ${FILEGATE_TOKEN}
  #     ALLOWED_BASE_PATHS: /data/homes,/data/groups
  #     PORT: "4000"
  #     REDIS_URL: redis://valkey:6379
  #   volumes:
  #     - filegate_homes:/data/homes
  #     - filegate_groups:/data/groups

volumes:
  postgres_data:
  valkey_data:
  # filegate_homes:
  # filegate_groups:
